<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fond sticker framboise avec contour crème, dans l'esprit .sticker-title -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#C8365C"/>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="none" stroke="#FBF4E4" stroke-width="3"/>

  <!-- "P" central en Fredoka-like, crème -->
  <text
    x="32"
    y="47"
    text-anchor="middle"
    font-family="'Fredoka', 'Fredoka One', ui-rounded, 'Nunito', 'Quicksand', system-ui, -apple-system, sans-serif"
    font-weight="700"
    font-size="44"
    fill="#FBF4E4"
    letter-spacing="-1"
  >P</text>

  <!-- Petit point de couture décoratif -->
  <circle cx="47" cy="18" r="2.2" fill="#A8D5CC"/>
</svg>
